apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:  
  name: pars-api
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/x-forwarded-proto: "https"   
spec:
  rules:
  - host: {HOST}
    http:
      paths:
      - path: /ns-pars
        pathType: Prefix
        backend:
          service:
            name: pars-api
            port:
              number: 80
  tls:
  - hosts:
    - {HOST}
    secretName: pars-api-tls